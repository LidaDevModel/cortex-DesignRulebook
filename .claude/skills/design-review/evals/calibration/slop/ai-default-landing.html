<!doctype html>
<!-- Calibration slop anchor #2: the generic AI-default aesthetic. Inter on
     pure white, purple-on-white gradient hero, three identical feature cards,
     "Click here" link, exclamation-mark copy. The exact look the fleet exists
     to prevent. Do not improve this file. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome to Our Platform</title>
<style>
  body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #ffffff; color: #000000; text-align: center; }
  .hero { padding: 80px 20px 60px; background: linear-gradient(135deg, #8b5cf6, #d946ef); color: #fff; }
  .hero h1 { font-size: 42px; margin: 0 0 12px; }
  .hero p { font-size: 18px; opacity: 0.9; }
  .cta { display: inline-block; margin-top: 24px; background: #fff; color: #8b5cf6; font-weight: bold; padding: 12px 28px; border-radius: 8px; text-decoration: none; }
  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 48px auto; padding: 0 20px; }
  .feature { border: 1px solid #eee; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .feature .icon { font-size: 32px; }
  .feature h3 { margin: 12px 0 6px; }
  .feature p { color: #888; font-size: 14px; }
  footer { padding: 32px; color: #999; font-size: 13px; }
</style>
</head>
<body>
<div class="hero">
  <h1>Welcome to Our Platform!</h1>
  <p>Revolutionize your workflow with the power of AI!</p>
  <a class="cta" href="#">Get Started</a>
</div>
<div class="features">
  <div class="feature"><div class="icon">🚀</div><h3>Fast</h3><p>Blazingly fast performance for all your needs.</p></div>
  <div class="feature"><div class="icon">🔒</div><h3>Secure</h3><p>Enterprise-grade security you can trust.</p></div>
  <div class="feature"><div class="icon">✨</div><h3>Smart</h3><p>AI-powered insights at your fingertips.</p></div>
</div>
<footer>Questions? <a href="#">Click here</a> to learn more!</footer>
</body>
</html>
